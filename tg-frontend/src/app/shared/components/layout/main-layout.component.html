<div class="flex h-dvh bg-background text-on-surface overflow-hidden">
  <app-sidebar class="shrink-0" />

  <div class="flex h-dvh min-w-0 flex-1 flex-col overflow-hidden">
    <header class="sticky top-0 z-30 border-b border-white/10 bg-surface-container/80 backdrop-blur-xl">
      <div class="flex h-16 items-center justify-between gap-4 px-4 lg:px-6">
        <div>
          <p class="font-headline text-lg font-extrabold text-primary">TiendasGo ERP</p>
          <p class="text-xs font-medium uppercase tracking-[0.28em] text-on-surface-variant">Panel operativo</p>
        </div>

        <div class="flex items-center gap-3">
          <div class="flex items-center gap-2 rounded-full border border-white/10 bg-surface-container-high px-3 py-1.5">
            <lucide-icon [img]="icons.UserRound" class="size-4 text-on-surface-variant"></lucide-icon>
            <span class="max-w-48 truncate font-label text-sm text-on-surface-variant">{{ userDisplayName() }}</span>
          </div>

          <button
            type="button"
            class="btn btn-sm rounded-full border border-white/10 bg-surface-container px-3 text-xs font-semibold uppercase tracking-wider text-on-surface-variant transition-colors hover:bg-surface-container-high hover:text-on-surface"
            aria-label="Cerrar sesion"
            [disabled]="loggingOut()"
            (click)="logout()"
          >
            <lucide-icon [img]="icons.LogOut" class="size-4"></lucide-icon>
            <span>{{ loggingOut() ? 'Cerrando...' : 'Cerrar sesion' }}</span>
          </button>
        </div>
      </div>
    </header>

    <main class="min-w-0 flex-1 overflow-auto p-4 lg:p-6">
      <div class="mx-auto w-full max-w-7xl">
        <router-outlet />
      </div>
    </main>
  </div>
</div>
