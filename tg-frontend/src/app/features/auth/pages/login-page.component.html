<main class="relative flex min-h-screen items-center justify-center overflow-hidden bg-background px-4 py-12">
  <div class="pointer-events-none absolute left-[-10%] top-[-10%] h-[40%] w-[40%] rounded-full bg-primary/10 blur-[120px]"></div>
  <div class="pointer-events-none absolute bottom-[-10%] right-[-10%] h-[30%] w-[30%] rounded-full bg-secondary/5 blur-[100px]"></div>

  <div class="relative z-10 w-full max-w-[480px]">
    <app-card>
      <div class="mb-10 text-center">
        <p class="font-headline text-4xl font-black tracking-tighter text-primary">TiendasGo</p>
        <h1 class="mt-3 font-headline text-2xl font-bold text-on-surface">Bienvenido de nuevo</h1>
        <p class="mt-2 text-sm text-on-surface-variant">Accede a tu panel de control editorial</p>
      </div>

      <form class="space-y-5" [formGroup]="form" (ngSubmit)="submit()">
        <app-input
          formControlName="email"
          label="Correo electronico"
          placeholder="nombre@empresa.com"
          type="email"
          icon="mail"
          autocomplete="email"
        />

        <app-input
          formControlName="password"
          label="Contrasena"
          placeholder="••••••••"
          type="password"
          icon="lock"
          autocomplete="current-password"
        />

        @if (errorMessage().length > 0) {
          <p class="text-sm font-medium text-error" role="alert">{{ errorMessage() }}</p>
        }

        <app-button type="submit" [disabled]="loading()">
          <span>{{ loading() ? 'Iniciando...' : 'Iniciar sesion' }}</span>
          <span class="material-symbols-outlined text-base">arrow_forward</span>
        </app-button>
      </form>
    </app-card>
  </div>
</main>
